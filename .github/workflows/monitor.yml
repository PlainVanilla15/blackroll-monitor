name: Blackroll M-Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pruefen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verfuegbarkeit pruefen
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MODUS: ${{ github.event.schedule == '0 5 * * *' && 'report' || 'monitor' }}
        run: python check.py
      - name: Status speichern
        run: |
          if [ -n "$(git status --porcelain status.txt)" ]; then
            git config user.name "monitor-bot"
            git config user.email "bot@example.com"
            git add status.txt
            git commit -m "Status aktualisiert"
            git push
          else
            echo "Keine Statusaenderung."
          fi
