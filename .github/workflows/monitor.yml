name: Blackroll M-Monitor

on:
  workflow_dispatch:          # Ausloeser kommt jetzt von aussen (cron-job.org)

permissions:
  contents: write

jobs:
  pruefen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verfuegbarkeit pruefen
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check.py
      - name: Status speichern
        run: |
          git config user.name "monitor-bot"
          git config user.email "bot@example.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Keine Aenderung."
          else
            git commit -m "Status/Report aktualisiert"
            git push
          fi
